<header class="main-header">
  <div class="header-content">
    <div class="logo" routerLink="/">
      <span class="icon">🐾</span>
      <h1>Veterinaria<span>App</span></h1>
    </div>
    
    <nav class="main-nav desktop-only">
      <ul>
        <li><a routerLink="/mascotas" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Mascotas</a></li>
        <li><a routerLink="/duenos" routerLinkActive="active">Clientes</a></li>
        <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
        <li><a routerLink="/turnos" routerLinkActive="active">Turnos</a></li>
      </ul>
    </nav>

    <div class="header-auth">
      <button class="menu-toggle" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="auth-desktop desktop-only">
        <button class="btn-login" *ngIf="!estaLogueado" (click)="abrirLogin()">Ingresar</button>
        <div class="user-info" *ngIf="estaLogueado">
          <span class="badge-admin" *ngIf="esAdmin">Admin</span>
          <button class="btn-logout" (click)="cerrarSesion()">Salir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-menu-modal" [class.is-open]="menuAbierto">
    <div class="modal-nav-content">
      <button class="btn-close-menu" (click)="toggleMenu()">×</button>
      
      <nav class="mobile-nav">
        <ul (click)="toggleMenu()"> <li><a routerLink="/mascotas" routerLinkActive="active">Mascotas</a></li>
          <li><a routerLink="/duenos" routerLinkActive="active">Clientes</a></li>
          <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
          <li><a routerLink="/turnos" routerLinkActive="active">Turnos</a></li>
        </ul>
      </nav>

      <div class="mobile-auth">
        <button class="btn-login-mobile" *ngIf="!estaLogueado" (click)="abrirLogin(); toggleMenu()">Ingresar</button>
        <div class="user-info-mobile" *ngIf="estaLogueado">
          <span class="badge-admin">Admin</span>
          <button class="btn-logout" (click)="cerrarSesion(); toggleMenu()">Cerrar Sesión</button>
        </div>
      </div>
    </div>
  </div>
</header>
