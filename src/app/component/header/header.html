<header class="main-header">
  <div class="header-content">
    <div class="logo">
      <span class="icon">🐾</span>
      <h1>Veterinaria<span>App</span></h1>
    </div>
    
    <nav class="main-nav">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Mascotas</a></li>
        <li><a routerLink="/duenos" routerLinkActive="active">Dueños</a></li>
        <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
        <li ><a  routerLink="/turnos" routerLinkActive="active">Turnos</a></li>
      </ul>
    </nav>

    <div class="header-auth">
      <button class="btn-login" *ngIf="!estaLogueado" (click)="abrirLogin()">🔑 Ingresar</button>
      <div class="user-info" *ngIf="estaLogueado">
        <span class="badge-admin" *ngIf="esAdmin">Admin</span>
        <button class="btn-logout" (click)="cerrarSesion()">🚪 Salir</button>
      </div>
    </div>
  </div>
</header>
