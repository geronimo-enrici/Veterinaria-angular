<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <span class="icon">🐾</span>
      <h1>VET-ADMIN</h1>
      <p>Gestión de Historia Clínica</p>
    </div>

    <form (submit)="onLogin()" #loginForm="ngForm">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required placeholder="ejemplo@correo.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="!loginForm.valid" class="btn-entrar">
        Iniciar Sesión
      </button>
      
      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
