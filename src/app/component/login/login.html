<div class="desarrollo">
  <p>Entorno de desarrollo, esperar 50 segundo para que se active el backend</p>
</div>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h2>Iniciar Sesión</h2>
      <p>Ingresa tus datos para acceder al sistema</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="ejemplo@correo.com"
          [(ngModel)]="credenciales.email" 
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••"
          [(ngModel)]="credenciales.password" 
          required>
      </div>

      <div *ngIf="mensajeError" class="error-msg">
        {{ mensajeError }}
      </div>

      <button type="submit" class="btn-login" [disabled]="!loginForm.valid">
        Ingresar
      </button>
    </form>
  </div>
</div>
