<div class="app-container">
  <div class="content-wrapper">
    <section class="form-card">
      <h2>Nueva Mascota</h2>
      <div class="form-group">
        <label>Nombre del Paciente</label>
        <input type="text" placeholder="Ej: Bobby" [(ngModel)]="nuevaMascota.nombre">
      </div>
      <div class="form-group">
        <label>Raza / Especie</label>
        <input type="text" placeholder="Ej: Labrador" [(ngModel)]="nuevaMascota.raza">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Edad</label>
          <input type="number" placeholder="0" [(ngModel)]="nuevaMascota.edad">
        </div>
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" placeholder="0.0" [(ngModel)]="nuevaMascota.peso">
        </div>
      </div>
      <div class="form-group">
        <label>Responsable (Dueño)</label>
        <select [(ngModel)]="nuevaMascota.duenoId" class="select-dueno">
          <option [ngValue]="null" disabled selected>Seleccione un dueño</option>
          <option *ngFor="let dueno of duenos" [value]="dueno.id">
            {{ dueno.nombre }} {{ dueno.apellido }}
          </option>
        </select>
      </div>
      <button (click)="guardarMascota()" class="btn-save">Guardar Mascota</button>
    </section>

    <section class="list-section">
      <h2>Pacientes Registrados</h2>
      
      <div class="search-container">
        <input 
          type="text" 
          class="search-input" 
          placeholder="🔍 Buscar por nombre, raza o dueño..." 
          [(ngModel)]="searchTerm" 
          (ngModelChange)="onSearchChange()"
        >
      </div>

      <div class="grid-container">
        <ng-container *ngFor="let mascota of paginatedMascotas">
          
          <div class="pet-card" *ngIf="!mascota.isPlaceholder; else emptySlot" (click)="irAlDetalle(mascota.id)">
            <div class="card-icon">🐶</div>
            <div class="card-info">
              <h3>{{ mascota.nombre }}</h3>
              <span class="breed">{{ mascota.raza }}</span>
              <div class="details">
                <span><strong>Dueño:</strong> {{ mascota.dueno ? mascota.dueno.nombre : 'Sin asignar' }}</span>
              </div>
            </div>
          </div>

          <ng-template #emptySlot>
            <div class="pet-card placeholder"></div>
          </ng-template>

        </ng-container>
      </div>

      <div class="pagination" *ngIf="totalPages > 1">
        <button (click)="currentPage = currentPage - 1" [disabled]="currentPage === 1">Anterior</button>
        <span>Página {{ currentPage }} de {{ totalPages }}</span>
        <button (click)="currentPage = currentPage + 1" [disabled]="currentPage >= totalPages">Siguiente</button>
      </div>
    </section>
  </div>
</div>
